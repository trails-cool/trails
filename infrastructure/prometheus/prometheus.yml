global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "journal"
    metrics_path: "/api/metrics"
    static_configs:
      - targets: ["journal:3000"]

  - job_name: "planner"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["planner:3001"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: "caddy"
    static_configs:
      - targets: ["caddy:2019"]
