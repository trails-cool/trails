apiVersion: 1

groups:
  - orgId: 1
    name: trails.cool alerts
    folder: trails.cool
    interval: 1m
    rules:
      - uid: disk-usage-high
        title: Disk usage > 80%
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: (1 - node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [80], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 15m
        annotations:
          summary: "Disk usage is above 80%"

      - uid: app-health-failing
        title: App health check failing
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: up{job=~"journal|planner"}
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [1], type: lt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 2m
        annotations:
          summary: "{{ $labels.job }} is down"

      - uid: error-rate-high
        title: Error rate > 5%
        condition: B
        noDataState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: prometheus
            model:
              expr: (sum(rate(caddy_http_request_duration_seconds_count{code=~"5.."}[5m])) or vector(0)) / clamp_min(sum(rate(caddy_http_request_duration_seconds_count[5m])), 0.001) * 100
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [5], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        annotations:
          summary: "Error rate is above 5%"

      - uid: container-restart-loop
        title: Container restart loop
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: changes(container_start_time_seconds{name=~"trails-cool.*"}[5m])
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [2], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 1m
        annotations:
          summary: "{{ $labels.name }} has restarted more than 2 times in 5 minutes"

      - uid: db-connections-high
        title: PostgreSQL connections > 80
        condition: B
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: sum(pg_stat_activity_count{datname="trails"})
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [80], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 5m
        annotations:
          summary: "PostgreSQL active connections above 80 — approaching default max_connections limit"

      - uid: app-crash-log
        title: Application crash detected
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki
            model:
              expr: sum(count_over_time({service=~"journal|planner"} |~ "uncaughtException|unhandledRejection|ERR_|FATAL|segfault|OOMKilled"[5m]))
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 0s
        noDataState: OK
        annotations:
          summary: "Crash signature detected in application logs"

      - uid: background-job-failures
        title: Background job failures
        condition: C
        noDataState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: postgres
            model:
              rawSql: "SELECT count(*) AS failed FROM pgboss.job WHERE state = 'failed' AND completed_on > now() - interval '1 hour'"
              format: table
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: B
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 0s
        annotations:
          summary: "Background jobs have failed in the last hour — check Grafana Service Health dashboard"

      - uid: brouter-scrape-down
        title: BRouter host unreachable
        condition: B
        noDataState: Alerting
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: up{job="brouter-cadvisor"}
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [1], type: lt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 2m
        annotations:
          summary: "BRouter host metrics scrape has been failing for 2+ minutes — the dedicated host, vSwitch, or cAdvisor may be down"

      - uid: caddy-502-rate
        title: Caddy 502 errors detected
        condition: B
        noDataState: OK
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus
            model:
              expr: sum(rate(caddy_http_request_duration_seconds_count{code="502"}[5m])) or vector(0)
              instant: true
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  reducer: { type: last }
        for: 2m
        annotations:
          summary: "Caddy is returning 502 errors — journal or planner upstream unreachable"

contactPoints:
  - orgId: 1
    name: email
    receivers:
      - uid: email-default
        type: email
        settings:
          addresses: admin@trails.cool

policies:
  - orgId: 1
    receiver: email
