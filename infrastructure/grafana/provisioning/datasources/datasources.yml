apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false

  - name: PostgreSQL
    uid: postgres
    type: postgres
    access: proxy
    url: postgres:5432
    user: grafana_reader
    editable: false
    jsonData:
      database: trails
      sslmode: disable
      maxOpenConns: 2
      maxIdleConns: 1
    secureJsonData:
      password: $__env{GRAFANA_DB_PASSWORD}
